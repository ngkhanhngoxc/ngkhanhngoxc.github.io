<!DOCTYPE html>
<html>
<head>
    <!-- Nhúng font Lexend -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background-color: #8B0000; 
            color: #FFFFE0; 
            font-family: sans-serif; /* Mặc định */
        }
        
        /* Chữ THE GIFT: Lexend, Cực to, In đậm */
        h1 { 
            font-family: 'Lexend', sans-serif;
            font-size: 130px; 
            font-weight: 700; 
            margin: 0; 
            text-transform: uppercase;
        }

        /* Chữ welcome: Cực to, In đậm, Monospace */
        .text { 
            font-size: 40px; 
            font-weight: bold; 
            font-family: monospace;
            margin: 30px 0; 
            min-height: 1.5em; 
        }

        /* Nút Enter Hub: Font Impact, Cực to, In đậm */
        .btn { 
            font-family: Impact, sans-serif;
            font-size: 50px; 
            font-weight: bold;
            padding: 25px 60px; 
            border: 4px solid #FFFFE0; 
            background: none; 
            color: #FFFFE0; 
            cursor: pointer; 
            transition: 0.3s;
            letter-spacing: 3px;
        }

        .btn:hover {
            background: #FFFFE0;
            color: #8B0000;
        }
    </style>
</head>
<body>
    <h1 id="title"></h1>
    <div id="welcome" class="text"></div>
    <button class="btn" onclick="window.location.href='gift.html'">ENTER HUB</button>

    <script>
        function typeText(text, id, speed) {
            let i = 0;
            function type() {
                if (i < text.length) {
                    document.getElementById(id).innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }
        // Gọi hiệu ứng gõ
        typeText("THE GIFT", "title", 150);
        setTimeout(() => typeText("WELCOME, THE EXCEPTION.", "welcome", 100), 1800);
    </script>
</body>
</html>
