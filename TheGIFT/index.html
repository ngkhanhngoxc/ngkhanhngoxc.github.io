<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #8B0000; color: #FFFFE0; font-family: sans-serif; }
        
        /* Hiệu ứng mờ ảo (fade in) */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* THE GIFT: Phát sáng mờ (text-shadow) + Mờ ảo */
        h1 { 
            font-family: 'Lexend', sans-serif; font-size: 130px; font-weight: 700; margin: 0; 
            text-transform: uppercase;
            text-shadow: 0 0 10px #FFFFE0, 0 0 20px #FFFFE0;
            animation: fadeIn 2s ease-in;
        }

        /* WELCOME: Gõ chữ */
        .text { font-size: 40px; font-weight: bold; font-family: monospace; margin: 30px 0; min-height: 1.5em; }

        /* ENTER HUB: Mờ ảo + Hiện sau 2s */
        .btn { 
            font-family: Impact, sans-serif; font-size: 50px; font-weight: bold; padding: 25px 60px; 
            border: 4px solid #FFFFE0; background: none; color: #FFFFE0; cursor: pointer;
            opacity: 0; /* Ẩn đi trước */
            animation: fadeIn 2s ease-in forwards;
            animation-delay: 2s; /* Đợi 2 giây mới hiện */
        }
    </style>
</head>
<body>
    <h1>THE GIFT</h1>
    <div id="welcome" class="text"></div>
    <button class="btn" onclick="window.location.href='gift.html'">ENTER HUB</button>

    <script>
        function typeText(text, id, speed) {
            let i = 0;
            function type() {
                if (i < text.length) {
                    document.getElementById(id).innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }
        // Gõ chữ hiện ra sau 1.5s
        setTimeout(() => typeText("WELCOME, THE EXCEPTION.", "welcome", 100), 1500);
    </script>
</body>
</html>
