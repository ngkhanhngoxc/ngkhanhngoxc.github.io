<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background-image: url('IMG_5872.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #FFFFE0; 
            font-family: sans-serif; 
        }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { 
            font-family: 'Lexend', sans-serif; 
            font-size: 100px; /* Nhỏ hơn một chút cho cân đối */
            font-weight: 700; 
            margin: 0; 
            text-transform: uppercase;
            text-shadow: 0 0 10px #FFFFE0, 0 0 20px #FFFFE0;
            animation: fadeIn 2s ease-in;
        }

        .text { 
            font-size: 30px; 
            font-weight: bold; 
            font-family: monospace; 
            margin: 20px 0; 
            min-height: 1.5em; 
        }

        .btn { 
            font-family: Impact, sans-serif; 
            font-size: 30px; 
            font-weight: normal; 
            padding: 12px 30px; 
            border: 2px solid #FFFFE0; 
            border-radius: 15px; 
            background: none; 
            color: #FFFFE0; 
            cursor: pointer;
            text-transform: lowercase; 
            opacity: 0; 
            animation: fadeIn 2s ease-in forwards;
            animation-delay: 2s; 
        }
    </style>
</head>
<body>
    <h1>THE GIFT</h1>
    <div id="welcome" class="text"></div>
    <button class="btn" onclick="window.location.href='gift.html'">enter hub</button>

    <script>
        function typeText(text, id, speed) {
            let i = 0;
            function type() {
                if (i < text.length) {
                    document.getElementById(id).innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }
        setTimeout(() => typeText("WELCOME, THE EXCEPTION.", "welcome", 100), 1500);
    </script>
</body>
</html>
