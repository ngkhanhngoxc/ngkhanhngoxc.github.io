<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            width: 100vw;
            height: 100vh;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            
            /* Cấu hình ảnh nền tràn viền tuyệt đối */
            background-image: url('IMG_5872.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            color: #FFFFE0; 
            font-family: sans-serif;
            overflow: hidden; /* Ngăn cuộn trang */
        }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { 
            font-family: 'Lexend', sans-serif; 
            font-size: 130px; 
            font-weight: 700; 
            margin: 0; 
            text-transform: uppercase;
            text-shadow: 0 0 10px #FFFFE0, 0 0 20px #FFFFE0;
            animation: fadeIn 2s ease-in;
        }

        .text { 
            font-size: 40px; 
            font-weight: bold; 
            font-family: monospace; 
            margin: 30px 0; 
            min-height: 1.5em; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .btn { 
            font-family: Impact, sans-serif; 
            font-size: 30px; 
            padding: 12px 30px; 
            border: 2px solid #FFFFE0; 
            border-radius: 15px; 
            background: rgba(255, 255, 224, 0.1);
            color: #FFFFE0; 
            cursor: pointer;
            text-transform: lowercase; 
            opacity: 0; 
            animation: fadeIn 2s ease-in forwards;
            animation-delay: 2s; 
            transition: 0.3s;
        }

        .btn:hover {
            background: #FFFFE0;
            color: #8B0000;
        }
    </style>
</head>
<body>
    <h1>THE GIFT</h1>
    <div id="welcome" class="text"></div>
    <button class="btn" onclick="window.location.href='gift.html'">enter hub</button>

    <script>
        function typeText(text, id, speed) {
            let i = 0;
            function type() {
                if (i < text.length) {
                    document.getElementById(id).innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }
        setTimeout(() => typeText("WELCOME, THE EXCEPTION.", "welcome", 100), 1500);
    </script>
</body>
</html>
