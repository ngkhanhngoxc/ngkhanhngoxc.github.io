<!DOCTYPE html>
<html>
<head>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center; 
            background-image: url('IMG_5885.png'); 
            background-size: cover; background-position: center;
            font-family: 'Courier New', Courier, monospace; /* Font chuẩn */
        }

        .box { 
            background: rgba(0,0,0,0.5); padding: 40px; border-radius: 15px; /* Bo nhẹ góc */
            box-shadow: 0 0 20px rgba(0,0,0,0.8), 0 0 15px rgba(255, 255, 255, 0.1);
            text-align: center; color: #FDFD96;
        }

        .label { font-weight: bold; margin-bottom: 15px; display: block; font-size: 18px; }
        
        input { 
            background: none; border: 1px solid #FDFD96; padding: 10px; 
            width: 250px; color: #FDFD96; text-align: center; margin-bottom: 20px;
            border-radius: 8px; /* Bo nhẹ khung nhập */
            font-family: 'Courier New', Courier, monospace;
        }

        .btn-group { display: flex; gap: 15px; justify-content: center; }
        
        button { 
            background: none; border: 1px solid #FDFD96; color: #FDFD96; 
            padding: 8px 20px; cursor: pointer; border-radius: 8px; /* Bo nhẹ nút */
            font-family: 'Courier New', Courier, monospace; font-weight: bold;
        }
        
        button:hover { background: #FDFD96; color: black; }
        
        .shake { animation: shake 0.2s; border-color: red !important; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } 100% { transform: translateX(0); } }
        
        #msg { margin-top: 15px; font-weight: bold; height: 20px; }
    </style>
</head>
<body>

    <div class="box">
        <label class="label">Password required to open this gift</label>
        <input type="password" id="passInput">
        <div class="btn-group">
            <button onclick="checkPass()">Confirm</button>
            <button onclick="window.location.href='index.html'">Back</button>
        </div>
        <div id="msg"></div>
    </div>

    <script>
        function checkPass() {
            let input = document.getElementById('passInput');
            let msg = document.getElementById('msg');
            
            if (input.value === "lucminh1604") {
                input.style.borderColor = "green";
                msg.style.color = "green";
                msg.innerHTML = "access successfully";
                setTimeout(() => { window.location.href = "destination.html"; }, 1000);
            } else {
                input.classList.add('shake');
                input.style.borderColor = "red";
                msg.style.color = "red";
                msg.innerHTML = "error";
                setTimeout(() => { input.classList.remove('shake'); }, 300);
            }
        }
    </script>
</body>
</html>
